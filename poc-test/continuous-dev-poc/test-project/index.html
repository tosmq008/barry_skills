<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计数器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>计数器</h1>
        <div class="card">
            <div id="counter" class="counter-display">0</div>
            <div class="button-group">
                <button id="decrement" class="btn btn-decrease">−</button>
                <button id="increment" class="btn btn-increase">+</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
